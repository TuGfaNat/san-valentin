<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carta Secreta</title>
    <style>
        body { background: #ffe6e6; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: Arial, sans-serif;}
        .envelope {
            width: 300px; height: 200px; background: #ff4d4d;
            position: relative; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.5s;
        }
        .envelope:hover { transform: scale(1.05); }
        .message {
            position: absolute; width: 280px; height: 180px; background: white;
            display: flex; justify-content: center; align-items: center;
            text-align: center; padding: 10px; box-sizing: border-box;
            opacity: 0; transition: 0.5s; z-index: 2; font-size: 1.2rem; color: #d63384;
        }
        .envelope:hover .message { opacity: 1; transform: translateY(-50px); }
        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 100px solid #cc0000; z-index: 3; transition: 0.5s;
        }
        .envelope:hover .flap { transform: scaleY(0); }
        .hint { margin-top: 60px; color: #888; font-size: 0.9rem; }
        .buy { margin-top: 20px; color: #ff4d4d; text-decoration: none; font-weight: bold;}
    </style>
</head>
<body>
    <div class="envelope">
        <div class="flap"></div>
        <div class="message">"Te amo más de lo que las palabras pueden expresar. ¡Feliz día!"</div>
        <span style="color: white; font-weight: bold; font-size: 40px;">✉️</span>
    </div>
    <div class="hint">👆 Toca el sobre para abrirlo</div>
    <a href="https://wa.me/59173034076?text=Hola%2C%20quiero%20el%20dise%C3%B1o%20CARTA%20SORPRESA%20%E2%9C%89%EF%B8%8F.%0A%0ADatos%20necesarios%3A%0A-%20Mensaje%20Secreto%3A" class="buy">💌 Vender esto</a>
</body>
</html>
