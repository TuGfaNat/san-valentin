<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Canción</title>
    <style>
        body { background: linear-gradient(to bottom, #76566d, #121212); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; color: white; margin: 0; }
        .player { width: 300px; background: #282828; padding: 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .album-art { width: 100%; height: auto; border-radius: 5px; margin-bottom: 20px; display: block; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h2 { margin: 0; font-size: 1.2rem; }
        p { margin: 5px 0 20px 0; color: #b3b3b3; font-size: 0.9rem; }
        .progress-bar { width: 100%; height: 4px; background: #535353; border-radius: 2px; margin-bottom: 20px; position: relative; }
        .progress { width: 60%; height: 100%; background: #1db954; border-radius: 2px; }
        .controls { text-align: center; font-size: 30px; }
        .btn-buy { display: block; text-align: center; margin-top: 20px; color: #1db954; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="player">
        <!-- PON TU FOTO AQUÍ: Cambia el src por la ruta de tu imagen -->
        <img src="https://via.placeholder.com/250" class="album-art" alt="Portada Álbum">

        <p>Tú y Yo - Edición Especial</p>
        <div class="progress-bar"><div class="progress"></div></div>
        <div class="controls">⏮ ▶ ⏭</div>
        <a href="https://wa.me/59173034076?text=Hola%2C%20quiero%20el%20dise%C3%B1o%20SPOTIFY%20%F0%9F%8E%B5.%0A%0ADatos%20necesarios%3A%0A-%20Canci%C3%B3n%3A%0A-%20Artista%3A%0A(Te%20paso%20la%20foto%20por%20aqu%C3%AD)" class="btn-buy">🎵 Regala una canción dedicada</a>
    </div>
</body>
</html>
