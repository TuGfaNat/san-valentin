<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de San Valentín</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            color: #ff4d6d;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        .card {
            background: #2d2d2d;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 150px;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.2);
            border-color: #ff4d6d;
        }
        .card h2 {
            margin: 0;
            font-size: 1.5rem;
        }
        .emoji {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        .footer {
            margin-top: 50px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>💘 Tus Diseños de San Valentín</h1>

    <div class="grid">
        <a href="demo.html" class="card" style="border-top: 5px solid #ff9a9e;">
            <span class="emoji">💌</span>
            <h2>Clásica</h2>
        </a>
        
        <a href="neon.html" class="card" style="border-top: 5px solid #ff00de;">
            <span class="emoji">⚡</span>
            <h2>Neon Love</h2>
        </a>

        <a href="polaroid.html" class="card" style="border-top: 5px solid #333;">
            <span class="emoji">📷</span>
            <h2>Polaroid</h2>
        </a>

        <a href="sorpresa.html" class="card" style="border-top: 5px solid #ff4d4d;">
            <span class="emoji">✉️</span>
            <h2>Carta Sorpresa</h2>
        </a>

        <a href="spotify.html" class="card" style="border-top: 5px solid #1db954;">
            <span class="emoji">🎵</span>
            <h2>Spotify</h2>
        </a>

        <a href="corazones.html" class="card" style="border-top: 5px solid #d32f2f;">
            <span class="emoji">🌹</span>
            <h2>Lluvia</h2>
        </a>
    </div>

    <div class="footer">
        ✨ Selecciona uno para ver el diseño ✨
    </div>

    <style>
        /* Animación de entrada escalonada */
        .card { 
            opacity: 0; 
            animation: fadeIn 0.5s ease forwards; 
        }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer animado */
        .footer {
            font-size: 1.2rem;
            color: #ff9a9e;
            animation: pulse 2s infinite;
            margin-top: 40px;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; color: #fff; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</body>
</html>
