<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaroid</title>
    <style>
        /* Fuente manuscrita para darle realismo */
        @import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');

        body {
            background: #f0f2f5 url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d1d5db' fill-opacity='0.4' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E"); /* Fondo sutil de rayas */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Indie Flower', cursive;
            overflow: hidden;
        }
        
        .polaroid-container {
            position: relative;
            transform: rotate(-3deg);
            transition: transform 0.5s ease;
        }
        
        .polaroid-container:hover {
            transform: rotate(0deg) scale(1.05);
            z-index: 10;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 50px 15px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
            border-radius: 2px;
        }
        
        .photo {
            width: 100%;
            height: 300px;
            object-fit: cover;
            filter: sepia(20%) contrast(110%); /* Filtro retro */
            margin-bottom: 20px;
            background: #eee;
            border: 1px solid #ddd;
        }

        h2 { 
            font-size: 2rem; 
            margin: 0; 
            color: #444; 
            transform: rotate(-1deg); /* Texto un poco chueco como escrito a mano */
        }
        
        /* Efecto de Cinta Adhesiva (Washi Tape) */
        .tape {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            width: 120px;
            height: 35px;
            background-color: rgba(255, 255, 255, 0.6);
            border-left: 2px dotted rgba(0,0,0,0.1);
            border-right: 2px dotted rgba(0,0,0,0.1);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            opacity: 0.8;
            z-index: 10;
        }
        
        /* Botón discreto */
        .btn-link { 
            font-family: sans-serif; 
            font-size: 11px; 
            text-decoration: none; 
            color: #aaa; 
            display: block; 
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-link:hover { color: #555; }
    </style>
</head>
<body>
    <div class="polaroid-container">
        <div class="tape"></div>
        <div class="polaroid">
            <!-- PON TU FOTO AQUÍ: Cambia el src por la ruta de tu imagen -->
            <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" class="photo" alt="Foto de pareja ejemplo">
            
            <!-- EDITABLE: Mensaje escrito a mano -->
            <h2>Tú & Yo Forever</h2>

            <a href="https://wa.me/59173034076?text=Hola%2C%20quiero%20el%20dise%C3%B1o%20POLAROID%20%F0%9F%93%B7.%0A%0ADatos%20necesarios%3A%0A-%20Texto%20del%20pie%20de%20foto%3A%0A(Te%20paso%20la%20foto%20por%20aqu%C3%AD)" class="btn-link">📷 Comprar plantilla</a>
        </div>
    </div>
</body>
</html>
